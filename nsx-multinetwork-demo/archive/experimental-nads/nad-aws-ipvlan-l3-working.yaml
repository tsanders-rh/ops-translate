---
# WORKING SOLUTION FOR AWS: Using ipvlan L3 mode with single shared subnet
# This approach works on AWS clusters without requiring VLAN support
#
# Key points:
# - All secondary networks share the same physical interface
# - Each network gets its own subnet from a larger shared space
# - ipvlan L3 mode handles routing between subnets automatically
# - No bridge configuration needed - simpler and more reliable
#
# Network Design:
# - Shared subnet: 10.244.0.0/16 (separate from pod network 10.128.0.0/14)
# - Web tier: 10.244.100.0/24
# - App tier: 10.244.150.0/24
# - DB tier: 10.244.200.0/24

apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: web-tier-vlan100
  namespace: virt-lab
  labels:
    translated-from: nsx-segment
    network-type: ipvlan-l3
spec:
  config: |-
    {
      "cniVersion": "0.3.1",
      "type": "ipvlan",
      "master": "enp126s0",
      "mode": "l3",
      "ipam": {
        "type": "host-local",
        "subnet": "10.244.100.0/24",
        "rangeStart": "10.244.100.10",
        "rangeEnd": "10.244.100.250"
      }
    }
---
