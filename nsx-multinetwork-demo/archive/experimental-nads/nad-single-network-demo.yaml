---
# Single Shared Network for Demo
# This uses one network for all pods to ensure connectivity works
# Network segmentation is enforced by MultiNetworkPolicy, not separate L2 domains
#
# This approach is recommended for:
# - Demo/testing environments
# - Clusters without true VLAN support (AWS, cloud providers)
# - Proving MultiNetworkPolicy functionality
#
# For production with true network segmentation, use:
# - Multi-ENI on AWS
# - VLAN trunking on bare metal
# - See SOLUTION_GUIDE_AWS.md for details

apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: web-tier-vlan100
  namespace: virt-lab
  labels:
    translated-from: nsx-segment
    network-type: macvlan
    vlan-id: "100"
    demo-mode: "shared-network"
spec:
  config: |-
    {
      "cniVersion": "0.3.1",
      "type": "macvlan",
      "master": "enp126s0",
      "mode": "bridge",
      "ipam": {
        "type": "host-local",
        "subnet": "10.244.0.0/16",
        "rangeStart": "10.244.100.10",
        "rangeEnd": "10.244.100.250"
      }
    }
---
