---
# Using macvlan with routes between VLANs
# This adds routing so pods can reach other secondary networks
#
# Routes are added via the IPAM configuration
# Traffic will flow through the host's VLAN interfaces which have IP forwarding enabled

apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: web-tier-vlan100
  namespace: virt-lab
  labels:
    translated-from: nsx-segment
    network-type: macvlan
    vlan-id: "100"
spec:
  config: |-
    {
      "cniVersion": "0.3.1",
      "type": "macvlan",
      "master": "enp126s0.100",
      "mode": "bridge",
      "ipam": {
        "type": "host-local",
        "subnet": "10.10.100.0/24",
        "rangeStart": "10.10.100.10",
        "rangeEnd": "10.10.100.250",
        "routes": [
          {
            "dst": "10.10.150.0/24"
          },
          {
            "dst": "10.10.200.0/24"
          }
        ]
      }
    }
