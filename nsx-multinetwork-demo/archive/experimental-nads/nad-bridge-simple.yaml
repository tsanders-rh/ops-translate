---
# Web Tier - VLAN 100 with simple bridge (no VLAN tagging)
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: web-tier-vlan100
  namespace: virt-lab
  labels:
    translated-from: nsx-segment
    vlan-id: '100'
spec:
  config: |-
    {
      "cniVersion": "0.3.1",
      "type": "bridge",
      "bridge": "br-vlan100",
      "isGateway": true,
      "ipMasq": false,
      "ipam": {
        "type": "host-local",
        "subnet": "10.10.100.0/24",
        "rangeStart": "10.10.100.10",
        "rangeEnd": "10.10.100.250",
        "gateway": "10.10.100.1",
        "routes": [
          {
            "dst": "10.10.150.0/24",
            "gw": "10.10.100.1"
          },
          {
            "dst": "10.10.200.0/24",
            "gw": "10.10.100.1"
          }
        ]
      }
    }
---
