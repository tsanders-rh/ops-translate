---
# AWS Test Setup for NSX Multi-Network Demo
# Uses ipvlan L3 mode with local subnets on the primary interface
# This provides isolated secondary networks for testing without requiring separate ENIs
#
# Network Design (isolated from primary pod network 10.128.0.0/14):
# - Web tier: 10.244.100.0/24
# - App tier: 10.244.150.0/24
# - DB tier: 10.244.200.0/24

apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: web-tier-vlan100
  namespace: virt-lab
  labels:
    translated-from: nsx-segment
    vlan-id: "100"
    network-type: ipvlan-l3
spec:
  config: |-
    {
      "cniVersion": "0.3.1",
      "type": "ipvlan",
      "master": "br-ex",
      "mode": "l3",
      "ipam": {
        "type": "host-local",
        "subnet": "10.244.100.0/24",
        "rangeStart": "10.244.100.10",
        "rangeEnd": "10.244.100.250"
      }
    }
---
