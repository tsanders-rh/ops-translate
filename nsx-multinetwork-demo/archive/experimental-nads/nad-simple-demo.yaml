---
# Simple NetworkAttachmentDefinitions for demo/testing
# These use bridge CNI without VLAN tagging - works on any cluster
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: web-tier-vlan100
  namespace: virt-lab
  labels:
    translated-from: nsx-segment
    source-workflow: nsx-3tier-app.workflow
    vlan-id: "100"
  annotations:
    source-location: nsx-3tier-app.workflow.xml:15
spec:
  config: |-
    {
      "cniVersion": "0.3.1",
      "type": "bridge",
      "bridge": "web-br0",
      "isGateway": true,
      "ipMasq": false,
      "ipam": {
        "type": "host-local",
        "subnet": "10.10.100.0/24",
        "rangeStart": "10.10.100.10",
        "rangeEnd": "10.10.100.250",
        "gateway": "10.10.100.1",
        "routes": [
          {"dst": "0.0.0.0/0"}
        ]
      }
    }
